name: New Pathway
description: Propose a new contributor pathway
title: "[Function] [Type]: [Title]"
labels: ["Pathways", "Pathways: New"]
body:
  - type: markdown
    attributes:
      value: |
        ## The idea
        Please format your issue title as: **Function — Type: Title**
        Example: *Design — Project: Blockify a Theme*

  - type: input
    id: title
    attributes:
      label: Pathway title
    validations:
      required: true

  - type: dropdown
    id: function
    attributes:
      label: Function
      options:
        - Build
        - Design
        - Write
        - Translate
        - Test
        - Organize
        - Promote
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - "Task: quick start, repeatable work"
        - "Project: focused work with a clear finish"
        - "Team: onboard to contribute regularly"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: "1-3 sentences: what the contributor will do and why it matters, in plain language."
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Links & Details
      description: "Include any links, Slack channels, or notes that should end up in the guide. See [TEMPLATE.md](https://github.com/WordPress/contributor-handbook/blob/main/pathways/TEMPLATE.md) for what a finished guide looks like."
