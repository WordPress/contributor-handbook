name: New Pathway
description: Propose a new contributor pathway
title: "[Function] [Type]: [Title]"
labels: ["Pathways", "Pathways: New"]
body:
  - type: markdown
    attributes:
      value: |
        ## The idea
        Please format your issue title as: **Function Type: Title**
        Example: *Design Project: Blockify a Theme*

  - type: input
    id: title
    attributes:
      label: Pathway title
    validations:
      required: true

  - type: dropdown
    id: function
    attributes:
      label: Function
      options:
        - Build
        - Design
        - Write
        - Translate
        - Test
        - Organize
        - Promote
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - "Task: quick start, repeatable work"
        - "Project: focused work with a clear finish"
        - "Team: onboard to contribute regularly"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: "1-3 sentences: what the contributor will do and why it matters, in plain language."
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Details (fill in what you know)

  - type: input
    id: connect
    attributes:
      label: Slack channel for this pathway

  - type: textarea
    id: setup
    attributes:
      label: Any additional setup beyond the basics?
      description: Tools, permissions, or prep specific to this pathway. Common setup is covered in Before You Begin.

  - type: textarea
    id: read-first
    attributes:
      label: Required reading
      description: Pathway-specific guides or standards.

  - type: textarea
    id: steps
    attributes:
      label: What does the contributor do?
      description: "Brief steps: enough to show the shape of the work. Full guides should live in team documents."
      value: |
        1. 
        2. 
        3. 

  - type: textarea
    id: done-looks-like
    attributes:
      label: Done looks like
      description: Checklist of what good looks like.
      value: |
        - [ ] 
        - [ ] 

  - type: input
    id: submit
    attributes:
      label: Where to submit the work

  - type: input
    id: reviewed-by
    attributes:
      label: Who reviews it and where to check for feedback

  - type: input
    id: next-step
    attributes:
      label: Natural next contribution after this one

  - type: input
    id: help-channel
    attributes:
      label: Where to ask for help
      description: Slack channel or forum for this specific pathway.
