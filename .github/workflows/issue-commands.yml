name: Issue Commands

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  process-command:
    if: ${{ !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Process issue command
        uses: actions/github-script@v8
        with:
          script: |
            const COMMANDS = {
              '/assign': { assign: true },
              '/blocked': { addLabels: ['blocked'] },
              '/unblock': { removeLabels: ['blocked'] },
              '/review': { addLabels: ['review'] },
              '/done': { addLabels: ['Admin'] },
            };

            const body = context.payload.comment.body || '';
            const match = body.trimStart().match(/^(\/assign|\/blocked|\/unblock|\/review|\/done)(?=\s|$)/i);

            if (!match) {
              return;
            }

            const command = match[1].toLowerCase();
            const config = COMMANDS[command];
            const issueParams = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            };

            if (config.assign) {
              const issue = await github.rest.issues.get(issueParams);

              if (issue.data.assignees.length > 0) {
                await github.rest.issues.addLabels({
                  ...issueParams,
                  labels: ['Admin'],
                });
              } else {
                try {
                  await github.rest.issues.addAssignees({
                    ...issueParams,
                    assignees: [context.payload.comment.user.login],
                  });
                } catch (error) {
                  await github.rest.issues.addLabels({
                    ...issueParams,
                    labels: ['Admin'],
                  });
                  core.warning(`Could not assign @${context.payload.comment.user.login}; added Admin instead.`);
                }
              }
            }

            if (config.addLabels?.length) {
              await github.rest.issues.addLabels({
                ...issueParams,
                labels: config.addLabels,
              });
            }

            for (const label of config.removeLabels || []) {
              try {
                await github.rest.issues.removeLabel({
                  ...issueParams,
                  name: label,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '+1',
            });

            core.info(`Processed ${command} on issue #${context.issue.number}.`);
